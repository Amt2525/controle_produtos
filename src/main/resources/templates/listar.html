<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Controle de Produtos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/produtos">
            <i class="bi bi-box-seam-fill"></i>
            Controle de Produtos
        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="card">

        <div class="card-header d-flex justify-content-between align-items-center">

            <h3 class="mb-0">
                Produtos Cadastrados
            </h3>

            <a class="btn btn-primary"
               th:href="@{/produtos/novo}">
                Novo Produto
            </a>

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table align-middle">

                    <thead>

                    <tr>

                        <th>ID</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Descrição</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                        <th class="text-center">Ações</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:each="produto : ${produtos}">

                        <td th:text="${produto.id}"></td>

                        <td class="fw-semibold"
                            th:text="${produto.nome}">
                        </td>

                        <td th:text="${produto.categoria}"></td>

                        <td th:text="${produto.descricao}"></td>

                        <td class="fw-semibold"
                            th:text="'R$ ' + ${#numbers.formatDecimal(produto.preco,1,2)}">
                        </td>

                        <td th:text="${produto.quantidade}"></td>

                        <td class="text-center">

                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/produtos/editar/{id}(id=${produto.id})}"
                               title="Editar">

                                <i class="bi bi-pencil"></i>

                            </a>

                            <a class="btn btn-outline-danger btn-sm"
                               th:href="@{/produtos/excluir/{id}(id=${produto.id})}"
                               onclick="return confirm('Deseja realmente excluir este produto?')"
                               title="Excluir">

                                <i class="bi bi-trash"></i>

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <footer class="text-center mt-4">

        <small>
            Sistema desenvolvido em Spring Boot + Thymeleaf
        </small>

    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
