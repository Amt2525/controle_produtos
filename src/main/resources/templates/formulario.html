<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">

    <title>Cadastro de Produto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Cadastro de Produto</h2>

    <form th:action="@{/produtos/salvar}"
          th:object="${produto}"
          method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label>Nome</label>
            <input class="form-control" type="text" th:field="*{nome}">
        </div>

        <div class="mb-3">
            <label>Descrição</label>
            <input class="form-control" type="text" th:field="*{descricao}">
        </div>

        <div class="mb-3">
            <label>Categoria</label>
            <input class="form-control" type="text" th:field="*{categoria}">
        </div>

        <div class="mb-3">
            <label>Preço</label>
            <input class="form-control"
                   type="number"
                   step="0.01"
                   th:field="*{preco}">
        </div>

        <div class="mb-3">
            <label>Quantidade</label>
            <input class="form-control"
                   type="number"
                   th:field="*{quantidade}">
        </div>

        <button class="btn btn-primary">
            Salvar
        </button>

        <a class="btn btn-secondary"
           th:href="@{/produtos}">
            Voltar
        </a>

    </form>

</div>

</body>
</html>
