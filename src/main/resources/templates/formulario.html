<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Produto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS do projeto -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/produtos">
            <i class="bi bi-box-seam-fill"></i>
            Controle de Produtos
        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header">

            <h3 class="mb-0">
                <i class="bi bi-plus-circle-fill"></i>
                Cadastro de Produto
            </h3>

        </div>

        <div class="card-body">

            <form th:action="@{/produtos/salvar}"
                  th:object="${produto}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-tag-fill"></i>
                            Nome
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{nome}"
                               placeholder="Digite o nome do produto">

                        <div class="text-danger mt-1"
                             th:errors="*{nome}"></div>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-grid-fill"></i>
                            Categoria
                        </label>

                        <input type="text"
                               class="form-control"
                               th:field="*{categoria}"
                               placeholder="Ex: Cozinha">

                        <div class="text-danger mt-1"
                             th:errors="*{categoria}"></div>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-card-text"></i>
                        Descrição
                    </label>

                    <textarea class="form-control"
                              rows="3"
                              th:field="*{descricao}"
                              placeholder="Descreva o produto"></textarea>

                    <div class="text-danger mt-1"
                         th:errors="*{descricao}"></div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-currency-dollar"></i>
                            Preço
                        </label>

                        <input type="number"
                               step="0.01"
                               class="form-control"
                               th:field="*{preco}"
                               placeholder="0,00">

                        <div class="text-danger mt-1"
                             th:errors="*{preco}"></div>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            <i class="bi bi-boxes"></i>
                            Quantidade
                        </label>

                        <input type="number"
                               class="form-control"
                               th:field="*{quantidade}"
                               placeholder="0">

                        <div class="text-danger mt-1"
                             th:errors="*{quantidade}"></div>

                    </div>

                </div>

                <hr>

                <div class="d-flex justify-content-end gap-2">

                    <a class="btn btn-outline-secondary"
                       th:href="@{/produtos}">

                        <i class="bi bi-arrow-left"></i>
                        Voltar

                    </a>

                    <button class="btn btn-primary">

                        <i class="bi bi-check-circle-fill"></i>
                        Salvar Produto

                    </button>

                </div>

            </form>

        </div>

    </div>

    <footer class="text-center mt-4 text-muted">

        <small>
            Sistema desenvolvido em Spring Boot + Thymeleaf
        </small>

    </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
